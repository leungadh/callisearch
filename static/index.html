<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>書法字典</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fdf8f0;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
      color: #3a2010;
    }

    header {
      text-align: center;
      border-bottom: 2px solid #c8a87a;
      padding-bottom: 20px;
      margin-bottom: 36px;
      width: 100%;
      max-width: 640px;
    }

    header h1 {
      font-size: 2em;
      color: #5c3d1e;
      letter-spacing: 0.15em;
    }

    header p {
      font-size: 0.8em;
      color: #aaa;
      margin-top: 4px;
      letter-spacing: 0.05em;
    }

    .search-bar {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 32px;
    }

    #char-input {
      border: none;
      border-bottom: 2px solid #c8a87a;
      background: transparent;
      font-size: 2em;
      width: 72px;
      text-align: center;
      color: #3a2010;
      font-family: inherit;
      outline: none;
      padding: 4px 0;
    }

    #char-input:focus { border-bottom-color: #8b5e3c; }

    #search-btn {
      background: #8b5e3c;
      color: #fdf8f0;
      border: none;
      border-radius: 4px;
      padding: 10px 20px;
      font-size: 0.9em;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.05em;
      transition: background 0.15s;
    }

    #search-btn:hover { background: #6b4628; }

    #hint {
      text-align: center;
      color: #bbb;
      font-size: 0.85em;
      margin-top: -16px;
      margin-bottom: 32px;
    }

    /* ── Result card ── */
    #result { width: 100%; max-width: 640px; }

    .result-card {
      background: #fff;
      border: 1px solid #e0d0b8;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
    }

    .result-card img {
      width: 110px;
      height: auto;
      border-radius: 3px;
      border: 1px solid #d0c4a8;
      object-fit: cover;
      flex-shrink: 0;
    }

    .result-meta { flex: 1; min-width: 0; }

    .label {
      font-size: 0.7em;
      color: #c8a87a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .poem-text {
      font-size: 0.95em;
      line-height: 1.9;
      color: #3a2010;
      white-space: pre-line;
      margin-bottom: 12px;
    }

    .count-line {
      font-size: 0.75em;
      color: #aaa;
    }

    .count-line a {
      color: #8b5e3c;
      cursor: pointer;
      text-decoration: underline;
    }

    .see-all-btn {
      background: none;
      border: none;
      color: #8b5e3c;
      cursor: pointer;
      text-decoration: underline;
      font-size: inherit;
      font-family: inherit;
      padding: 0;
    }

    /* ── Thumbnail strip ── */
    #thumbnails {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    #thumbnails.visible { display: flex; }

    .thumb {
      width: 60px;
      height: 72px;
      object-fit: cover;
      border-radius: 3px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .thumb.active { border-color: #8b5e3c; }
    .thumb:hover  { border-color: #c8a87a; }

    /* ── Not found ── */
    .not-found {
      text-align: center;
      border: 1px solid #e0c8b0;
      border-radius: 8px;
      padding: 20px 28px;
      background: #fff9f3;
      color: #b07050;
      font-size: 0.95em;
    }

    /* ── Empty state brush icon ── */
    #empty-state {
      text-align: center;
      opacity: 0.15;
      font-size: 4em;
      margin-top: 24px;
      user-select: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>書法字典</h1>
    <p>Calligraphy Character Reference</p>
  </header>

  <div class="search-bar">
    <input id="char-input" type="text" placeholder="字" maxlength="10" autocomplete="off" />
    <button id="search-btn">搜尋</button>
  </div>

  <p id="hint">輸入一個漢字，然後按搜尋</p>

  <div id="result"></div>
  <div id="empty-state">🖌</div>

  <script>
    const input     = document.getElementById('char-input');
    const btn       = document.getElementById('search-btn');
    const resultEl  = document.getElementById('result');
    const emptyEl   = document.getElementById('empty-state');
    const hintEl    = document.getElementById('hint');

    let allResults  = [];
    let activeIndex = 0;

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function showResult(index, keepStripOpen = false) {
      activeIndex = index;
      const r = allResults[index];
      const total = allResults.length;

      const thumbsHtml = total > 1
        ? allResults.map((res, i) =>
            `<img class="thumb${i === index ? ' active' : ''}"
                  src="${esc(res.image_url)}"
                  data-index="${i}"
                  alt="image ${i + 1}" />`
          ).join('')
        : '';

      resultEl.innerHTML = `
        <div class="result-card">
          <img src="${esc(r.image_url)}" alt="calligraphy image" />
          <div class="result-meta">
            <div class="label">詩文</div>
            <div class="poem-text">${esc(r.poem_text)}</div>
            <div class="count-line">
              ${index + 1} of ${total} image${total > 1 ? 's' : ''}
              ${total > 1 ? `&nbsp;·&nbsp;<button class="see-all-btn">see all ${total} →</button>` : ''}
            </div>
          </div>
        </div>
        ${total > 1 ? `<div id="thumbnails">${thumbsHtml}</div>` : ''}
      `;

      document.querySelectorAll('.thumb').forEach(t => {
        t.addEventListener('click', () => showResult(Number(t.dataset.index), true));
      });

      if (keepStripOpen) {
        const strip = document.getElementById('thumbnails');
        if (strip) strip.classList.add('visible');
      }

      const seeAllBtn = resultEl.querySelector('.see-all-btn');
      if (seeAllBtn) seeAllBtn.addEventListener('click', toggleThumbs);
    }

    function toggleThumbs() {
      const strip = document.getElementById('thumbnails');
      if (strip) strip.classList.toggle('visible');
    }

    async function doSearch() {
      const raw = input.value.trim();
      if (!raw) return;
      const char = [...raw][0];  // first Unicode code point

      hintEl.style.display = 'none';
      emptyEl.style.display = 'none';
      resultEl.innerHTML = '';

      try {
        const resp = await fetch(`/search?char=${encodeURIComponent(char)}`);
        if (!resp.ok) throw new Error(`Server error: ${resp.status}`);
        const data = await resp.json();

        if (data.total === 0) {
          resultEl.innerHTML = `
            <div class="not-found">
              「${esc(char)}」— No calligraphy image found in this collection.
            </div>`;
          return;
        }

        allResults = data.results;
        showResult(0);
      } catch (err) {
        resultEl.innerHTML = `
          <div class="not-found">
            Search failed. Please check the server is running.
          </div>`;
      }
    }

    btn.addEventListener('click', doSearch);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
  </script>

</body>
</html>
